services:
  postgres:
    image: postgres:16-alpine
    container_name: openmes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openmes
      POSTGRES_USER: openmes
      POSTGRES_PASSWORD: openmes
    ports:
      - "5432:5432"
    volumes:
      - openmes-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmes -d openmes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  openmes-pgdata:
